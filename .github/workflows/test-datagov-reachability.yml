# Temporary diagnostic — step 2: can the existing FIREBASE_SERVICE_ACCOUNT
# repo secret write to Firestore? (Step 1 proved GitHub runners reach
# api.data.gov.in while Cloud Functions get TCP-reset by its WAF.)
# Safe to delete once the AQI fetch path is settled.
name: test-datagov-reachability

on:
  workflow_dispatch:
  push:
    branches:
      - claude/aqi-data-integration-research-a3ph3s
    paths:
      - .github/workflows/test-datagov-reachability.yml

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check secret availability (length only, never content)
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "FIREBASE_SERVICE_ACCOUNT length: ${#SA}"
          echo "secret names visible to this run cannot be listed; empty length means not injected"

      - name: Auth with Firebase service account
        id: auth
        if: ${{ vars.ALWAYS_FALSE == 'never' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/datastore

      - name: Try writing a probe doc to Firestore
        run: |
          set +e
          BASE='https://firestore.googleapis.com/v1/projects/hawaa-air-27548/databases/(default)/documents'
          echo "--- PATCH aqi/_probe ---"
          code=$(curl -sS -o /tmp/w.json -w '%{http_code}' --max-time 30 \
            -X PATCH \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H 'Content-Type: application/json' \
            -d '{"fields":{"probe":{"booleanValue":true}}}' \
            "$BASE/aqi/_probe")
          echo "http=$code"; head -c 300 /tmp/w.json; echo
          echo "--- DELETE aqi/_probe ---"
          code=$(curl -sS -o /tmp/d.json -w '%{http_code}' --max-time 30 \
            -X DELETE \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "$BASE/aqi/_probe")
          echo "http=$code"; head -c 300 /tmp/d.json; echo
          exit 0
